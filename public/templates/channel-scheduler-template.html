<!--
  Standard Channel Scheduler Template
  Use this as a reference for implementing consistent scheduler UI across all channels
  
  Usage:
  - Replace {{CHANNEL}} with the channel prefix (e.g., 'telegram', 'pinterest', 'vk')
  - Replace {{Channel}} with the capitalized channel name (e.g., 'Telegram', 'Pinterest')
  - Include both channel settings block and schedule settings block
-->

<!-- BLOCK 1: Channel Settings -->
<div class="channel-settings-block">
    <h3>⚙️ Настройки канала {{Channel}}</h3>
    
    <!-- Channel-specific authentication/connection fields -->
    <!-- Example: API keys, tokens, account selection -->
    <div class="scheduler-field-row">
        <label for="{{channel}}ApiKey">API Key / Token</label>
        <input type="text" id="{{channel}}ApiKey" placeholder="Введите API ключ">
    </div>
    
    <!-- Channel Active - automatically active when connected -->
    <!-- This field is informational, not editable -->
    <div class="scheduler-field-row">
        <label>Статус канала</label>
        <div id="{{channel}}Status" style="padding: 8px; background: #e9ecef; border-radius: 4px; font-size: 14px;">
            Подключено
        </div>
    </div>
    
    <!-- Moderator User ID (shown when premoderation is enabled) -->
    <div class="scheduler-field-row moderator-field" id="{{channel}}ModeratorField">
        <label for="{{channel}}ModeratorUserId">ID Модератора</label>
        <input type="text" id="{{channel}}ModeratorUserId" placeholder="Telegram user ID модератора">
    </div>
</div>

<!-- BLOCK 2: Schedule Settings -->
<div class="schedule-settings-block">
    <h3>📅 Расписание публикаций</h3>
    
    <!-- Time Picker: Hour + Minute -->
    <label>Время публикации</label>
    <div class="scheduler-time-row">
        <select id="{{channel}}ScheduleHour" onchange="update{{Channel}}ScheduleTime()">
            <!-- Hours 00-23 generated by JS -->
        </select>
        <span>:</span>
        <input type="text" id="{{channel}}ScheduleMinute" maxlength="2" placeholder="00" 
               oninput="validate{{Channel}}Minutes(); update{{Channel}}ScheduleTime()">
        <input type="hidden" id="{{channel}}ScheduleTime">
    </div>
    
    <!-- Timezone Selector -->
    <div class="scheduler-tz-row">
        <label for="{{channel}}ScheduleTz">Часовой пояс</label>
        <select id="{{channel}}ScheduleTz">
            <!-- 60+ timezones generated by JS -->
        </select>
    </div>
    
    <!-- Daily Limit -->
    <div class="scheduler-field-row">
        <label for="{{channel}}DailyLimit">Дневной лимит</label>
        <input type="number" id="{{channel}}DailyLimit" min="1" max="100" value="10" placeholder="Количество публикаций в день">
    </div>
    
    <!-- Publish Interval -->
    <div class="scheduler-field-row">
        <label for="{{channel}}PublishInterval">Интервал публикаций</label>
        <select id="{{channel}}PublishInterval">
            <option value="0.5">30 минут</option>
            <option value="1">1 час</option>
            <option value="3" selected>3 часа</option>
            <option value="5">5 часов</option>
            <option value="12">12 часов</option>
            <option value="24">24 часа</option>
        </select>
    </div>
    
    <!-- Weekday Checkboxes -->
    <label>Дни недели</label>
    <div class="scheduler-weekdays-row" id="{{channel}}Weekdays">
        <!-- Generated by JS: generateWeekdayCheckboxes('{{channel}}-weekday', selectedWeekdays) -->
    </div>
    
    <!-- Universal Toggles -->
    <div class="scheduler-checkbox-row">
        <input type="checkbox" id="{{channel}}RandomPublish">
        <label for="{{channel}}RandomPublish">Рандом 0-15% от интервала</label>
    </div>
    
    <div class="scheduler-checkbox-row">
        <input type="checkbox" id="{{channel}}Premoderation" onchange="toggle{{Channel}}ModeratorField()">
        <label for="{{channel}}Premoderation">Отправлять на премодерацию</label>
    </div>
</div>

<!-- Action Buttons (below both blocks) -->
<div class="scheduler-controls">
    <button class="btn btn-primary" onclick="save{{Channel}}Config()">Сохранить настройки</button>
    <button class="btn btn-success" onclick="generate{{Channel}}Now()">▶️ Тест сейчас</button>
</div>

<!-- Status Line -->
<div class="scheduler-status" id="{{channel}}SettingsStatus"></div>

<!-- 
  JavaScript Helper Functions (to be implemented in channels.js):
  
  1. update{{Channel}}ScheduleTime() - Combines hour+minute into hidden input
  2. validate{{Channel}}Minutes() - Sanitizes minute input (0-59)
  3. toggle{{Channel}}ModeratorField() - Shows/hides moderator field based on premoderation
  4. save{{Channel}}Config() - Saves channel configuration to backend
  5. load{{Channel}}Config() - Loads channel configuration from backend
  6. generate{{Channel}}Now() - Triggers immediate content generation
  
  Initialization on page load:
  - Generate hour options (00-23) for {{channel}}ScheduleHour select
  - Generate timezone options using generateTimezoneSelect('{{channel}}ScheduleTz', selectedValue)
  - Generate weekday checkboxes using generateWeekdayCheckboxes('{{channel}}-weekday', selectedWeekdays)
  - Load existing config using load{{Channel}}Config()
-->
