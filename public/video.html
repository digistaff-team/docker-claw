<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видео-пайплайн — Клиент Завод</title>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }
        .video-card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            background: #fafafa;
        }
        .video-card video {
            width: 100%;
            aspect-ratio: 9/16;
            object-fit: cover;
            background: #000;
            display: block;
        }
        .video-card .info {
            padding: 12px;
        }
        .video-card .info h4 {
            margin: 0 0 8px;
            font-size: 14px;
            color: #333;
        }
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-pending          { background: #fff3cd; color: #856404; }
        .status-scene_generating { background: #d1ecf1; color: #0c5460; }
        .status-scene_ready      { background: #d1ecf1; color: #0c5460; }
        .status-video_generating { background: #cce5ff; color: #004085; }
        .status-video_ready      { background: #d4edda; color: #155724; }
        .status-published        { background: #d4edda; color: #155724; }
        .status-expired          { background: #f8d7da; color: #721c24; }
        .status-failed           { background: #f8d7da; color: #721c24; }
        .channel-marks {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        .channel-mark {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .channel-used { background: #28a745; color: #fff; }
        .channel-free { background: #6c757d; color: #fff; }
        .countdown {
            font-family: monospace;
            color: #dc3545;
            font-weight: bold;
            font-size: 12px;
            margin-top: 6px;
        }
        .interior-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
        }
        .interior-item:last-child { border-bottom: none; }
        .image-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .image-item:last-child { border-bottom: none; }
        .image-item img {
            width: 44px;
            height: 44px;
            object-fit: cover;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-bar .fill {
            height: 100%;
            background: #007bff;
            animation: progress-pulse 1.5s ease-in-out infinite;
        }
        @keyframes progress-pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.4; }
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6c757d;
            font-size: 14px;
        }
        .model-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        .model-card {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 14px 16px;
            cursor: pointer;
            transition: border-color 0.15s, box-shadow 0.15s;
            position: relative;
            background: #fff;
        }
        .model-card:hover:not(.model-card--disabled) {
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }
        .model-card.model-card--active {
            border-color: #007bff;
            background: #f0f7ff;
        }
        .model-card--disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }
        .model-card__name {
            font-weight: 600;
            font-size: 15px;
            color: #222;
            margin-bottom: 3px;
        }
        .model-card__provider {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }
        .model-card__badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-available { background: #d4edda; color: #155724; }
        .badge-soon      { background: #e2e3e5; color: #555; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }
        .stat-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 14px;
            text-align: center;
        }
        .stat-item .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #333;
        }
        .stat-item .stat-label {
            font-size: 12px;
            color: #6c757d;
            margin-top: 4px;
        }
        .inline-form {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .inline-form input {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .inline-form input[type="text"] { flex: 1; min-width: 180px; }
        .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 16px;
        }
        .filter-bar select {
            padding: 7px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap;">
                <div>
                    <h1>🙋🏻‍♂️ Клиент Завод</h1>
                    <p>Ваш личный ИИ агент по рекламе в соцсетях</p>
                </div>
                <div id="logoutButton" style="display: none;">
                    <button class="btn btn-secondary" onclick="logout()" style="padding: 10px 20px; font-size: 14px;">Выйти</button>
                </div>
            </div>
        </div>

        <div class="auth-section" id="authSection" style="display: none;">
            <h2 style="margin-bottom: 20px;">Вход в систему</h2>
            <p style="margin-bottom: 20px; color: #666;">Введите ваш Chat ID</p>
            <input type="text" id="chatIdInput" placeholder="Введите Chat ID (например: 123456789)" />
            <br>
            <button onclick="login()">Войти</button>
        </div>

        <div class="main-content" id="mainContent">
            <nav class="nav-tabs" id="mainMenu"></nav>

            <!-- Изображения товаров -->
            <div class="panel full-width">
                <div class="content-section-head">
                    <div>
                        <h2>📦 Изображения товаров</h2>
                        <p class="content-section-subtitle">Файлы из папки <code>/workspace/input</code> — загружайте через <a href="/files.html">Файлы</a></p>
                    </div>
                    <button class="btn btn-secondary" onclick="loadProductImages()">Обновить</button>
                </div>
                <div id="productImages"><div class="empty-state">Загрузка...</div></div>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/video.js"></script>
    <script>
        window.addEventListener('load', () => {
            renderMenu('/video.html');
            initAuth();
        });
    </script>
</body>
</html>
