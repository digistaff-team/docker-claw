services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: clientzavod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    networks:
      - app-network
    mem_limit: 512M
    cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: mysql-skills
    command: >
      --innodb_buffer_pool_size=128M
      --max_connections=50
      --table_open_cache=200
      --sort_buffer_size=256K
      --read_buffer_size=128K
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mysql_root_password_change_me}
      MYSQL_DATABASE: ai_skills_db
      MYSQL_USER: ai_skills
      MYSQL_PASSWORD: ${MYSQL_SKILLS_PASSWORD:-mysql_password_change_me}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./services/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:3306:3306"
    restart: unless-stopped
    networks:
      - app-network
    mem_limit: 512M
    cpus: '1.0'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ai_skills", "-p${MYSQL_SKILLS_PASSWORD:-mysql_password_change_me}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app-network
    mem_limit: 128M
    cpus: '0.5'

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - app-network

  # Примечание: пользовательские контейнеры sandbox-user-* создаются динамически
  # сервисом docker.service.js. Их лимиты задаются через переменные окружения:
  #   CONTAINER_MEMORY=256m  (по умолчанию в config.js)
  #   CONTAINER_CPUS=0.5
  # Измените эти значения в .env файле для настройки лимитов контейнеров.

  app:
    build: .
    container_name: bash-executor
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/sandbox-data:/var/sandbox-data
      - /var/sandbox-backups:/var/sandbox-backups
      - /var/sandbox-snapshots:/var/sandbox-snapshots
    environment:
      - NODE_ENV=production
      - PORT=3015
      - PG_HOST=postgres
      - PG_ADMIN_HOST=postgres
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_PASSWORD=${POSTGRES_PASSWORD}
      - PG_DATABASE=clientzavod
      - MYSQL_SKILLS_HOST=mysql
      - MYSQL_SKILLS_PORT=3306
      - MYSQL_SKILLS_USER=ai_skills
      - MYSQL_SKILLS_PASSWORD=${MYSQL_SKILLS_PASSWORD:-mysql_password_change_me}
      - MYSQL_SKILLS_DATABASE=ai_skills_db
    ports:
      - "3015:3015"
    depends_on:
      - postgres
      - mysql
    restart: unless-stopped
    networks:
      - app-network
    mem_limit: 512M
    cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"

volumes:
  postgres_data:
  mysql_data:

networks:
  app-network:
    driver: bridge