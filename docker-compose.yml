services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clientzavod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - app-network      

  app:
    build: .
    container_name: bash-executor
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/sandbox-data:/var/sandbox-data
      - /var/sandbox-backups:/var/sandbox-backups
      - /var/sandbox-snapshots:/var/sandbox-snapshots
    environment:
      - NODE_ENV=production
      - PORT=3015
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_PASSWORD=postgres
      - PG_DATABASE=clientzavod
    ports:
      - "3015:3015"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - app-network
    privileged: true

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
