# HTTP → HTTPS редирект
server {
    listen 80;
    server_name clientzavod.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS сервер
server {
    listen 443 ssl;
    server_name clientzavod.ru;

    ssl_certificate /etc/letsencrypt/live/clientzavod.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clientzavod.ru/privkey.pem;

    # Безопасность
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Docker DNS resolver с коротким TTL — решает 502 после рестарта app
    resolver 127.0.0.11 valid=10s;
    set $upstream http://app:3015;

    location / {
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
}
